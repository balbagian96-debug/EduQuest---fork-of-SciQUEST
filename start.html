// ================= CANVAS =================

// Four distinct Level 1 platform layouts (px above groundY for each of the

// ================= LUCKY BLOCK (3D isometric Canvas 2D) =================
let luckyBlockReady = true; // pure canvas — always ready
let lbAngle = 0;

function initLuckyBlock() {}

function drawLuckyBlock(x, y, w, h) {
  lbAngle += 0.04;
  const bob = Math.sin(lbAngle) * h * 0.07;
  y = y + bob;

  // Draw the cube ABOVE the bounding box so the top & side overhang visibly
  // The front face occupies the original h; top/side extend outside it.
  const depth = h * 0.38; // top-face height — tall so it reads clearly
  const sideW = w * 0.28; // right-face width — wide enough to see

  const FRONT   = "#FFD700";
  const TOP     = "#FFFAAA"; // near-white highlight
  const SIDE    = "#7A5500"; // very dark brown shadow side
  const BORDER  = "#3B2000";
  const STUD    = "#FFFFF0";
  const QWHITE  = "#FFFFFF";
  const QSHADOW = "#7A5500";

  ctx.save();

  // Top face — extends ABOVE y so the cube pops upward
  ctx.beginPath();
  ctx.moveTo(x,           y);               // bottom-left of top face
  ctx.lineTo(x + sideW,   y - depth);       // top-left
  ctx.lineTo(x + w,       y - depth);       // top-right
  ctx.lineTo(x + w - sideW, y);             // bottom-right of top face
  ctx.closePath();
  ctx.fillStyle = TOP;
  ctx.fill();
  ctx.strokeStyle = BORDER; ctx.lineWidth = 2; ctx.stroke();

  // Right side face — extends to the RIGHT of the front face
  ctx.beginPath();
  ctx.moveTo(x + w - sideW, y);             // top-left of side (= bottom-right of top)
  ctx.lineTo(x + w,         y - depth);     // top-right of side
  ctx.lineTo(x + w,         y + h - depth); // bottom-right of side
  ctx.lineTo(x + w - sideW, y + h);         // bottom-left of side
  ctx.closePath();
  ctx.fillStyle = SIDE;
  ctx.fill();
  ctx.strokeStyle = BORDER; ctx.lineWidth = 2; ctx.stroke();

  // Front face — the main gold square at original position
  const fw = w - sideW;
  const fy = y;
  const fh = h;
  ctx.fillStyle = FRONT;
  ctx.fillRect(x, fy, fw, fh);

  // Inner border frame
  const pad = fw * 0.09;
  ctx.strokeStyle = BORDER;
  ctx.lineWidth = Math.max(2, fw * 0.07);
  ctx.strokeRect(x + pad, fy + pad, fw - pad * 2, fh - pad * 2);

  // Corner studs
  const sr = Math.max(3, fw * 0.09);
  const ox = fw * 0.18, oy = fh * 0.18;
  [[x + ox, fy + oy], [x + fw - ox, fy + oy],
   [x + ox, fy + fh - oy], [x + fw - ox, fy + fh - oy]].forEach(([sx2, sy2]) => {
    ctx.beginPath(); ctx.arc(sx2, sy2, sr, 0, Math.PI * 2);
    ctx.fillStyle = STUD; ctx.fill();
    ctx.strokeStyle = BORDER; ctx.lineWidth = 1.5; ctx.stroke();
  });

  // ? mark
  const fontSize = Math.round(fh * 0.52);
  ctx.font = `900 ${fontSize}px Arial`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const qx = x + fw / 2, qy = fy + fh / 2 + fh * 0.04;
  ctx.fillStyle = QSHADOW; ctx.fillText("?", qx + 2, qy + 2);
  ctx.fillStyle = QWHITE;  ctx.fillText("?", qx, qy);

  // Front face outline
  ctx.strokeStyle = BORDER; ctx.lineWidth = 2;
  ctx.strokeRect(x, fy, fw, fh);

  ctx.restore();
  return true;
}

// ================= GEMINI QUESTION GENERATION =================
// Calls are proxied through apps-script-backend.gs (action: "generateQuestions")
// rather than hitting Google directly — client-side Gemini keys are no longer
// viable on this account (AI Studio keys reject direct REST calls; Cloud
// Console keys for the Gemini API now require a service-account binding the
// browser can't hold). The backend uses its own authorized identity instead,
// so the frontend never sees a Gemini credential at all.

// The pool is now 15 (5 per level). Accept >= 11 so a slightly short Gemini
// response is still usable; anything smaller falls back to the offline bank.
function validateQuestions(arr) {
  return Array.isArray(arr) && arr.length >= 11 && arr.every(q =>
    q && typeof q.text === "string" &&
    Array.isArray(q.choices) && q.choices.length === 4 &&
    Number.isInteger(q.correct) && q.correct >= 1 && q.correct <= 4
  );
}

const GEMINI_TIMEOUT_MS = 20000;

async function fetchGeminiQuestions(topic, grade) {
  // Abort if the backend takes longer than 20s so a slow call falls back to
  // the offline bank instead of leaving the player on the loading screen.
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), GEMINI_TIMEOUT_MS);
  try {
    // No explicit Content-Type header — matches the existing saveProgress/
    // addScore calls' pattern so this stays a CORS "simple request" and skips
    // the preflight OPTIONS check that Apps Script Web Apps don't handle.
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "generateQuestions", topic, subject: selectedSubject, grade }),
      signal: controller.signal
    });
    if (!res.ok) throw new Error("backend_http_" + res.status);

    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "backend_generation_failed");

    if (!validateQuestions(data.questions)) throw new Error("gemini_shape_invalid");
    return data.questions;
  } finally {
    clearTimeout(timer);
  }
}

function pickFallback(topic, grade) {
  const tier = grade <= 8 ? "low" : grade === 9 ? "mid" : "high";
  if (getLanguage() === "tl" && SCI_MATH_TOPICS.includes(topic) && FALLBACK_BANKS_TL[topic]) {
    return FALLBACK_BANKS_TL[topic][tier];
  }
  return FALLBACK_BANKS[topic][tier];
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let activeQuestions = null;

// Each of the 3 levels draws its own distinct 5-question slice of the pool, so
// questions no longer carry over between levels. Pools are 15 (Gemini asks for
// 15; every offline tier holds 15). The modulo keeps it safe if a pool ever
// comes back smaller than 15.
function questionsForLevel(level) {
  const pool = activeQuestions || [];
  if (!pool.length) return [];
  const per = 5, start = (level - 1) * per;
  const out = [];
  for (let i = 0; i < per; i++) out.push(pool[(start + i) % pool.length]);
  return out;
}

// A wrong answer doesn't let the player past — it swaps in a different
// question from the same topic pool so the same obstacle can be retried
// with fresh content instead of repeating the one just missed.
function pickReplacementQuestion(exclude) {
  const pool = (activeQuestions || []).filter(q => q.text !== exclude.text);
  if (!pool.length) return exclude;
  return pool[Math.floor(Math.random() * pool.length)];
}

// Live Gemini generation is disabled for now: the Generative Language API
// only supports API-key auth (not viable client-side on this account) and
// the OAuth-compatible alternative, Vertex AI, needs billing enabled — not
// worth it for this project. fetchGeminiQuestions()/generateQuestions stay
// in place (frontend + apps-script-backend.gs) as dormant plumbing in case
// Vertex AI gets set up later; loadQuestions() just goes straight to the
// offline bank so players aren't stuck waiting on a call that can't succeed.
async function loadQuestions() {
  if (FALLBACK_BANKS[selectedTopic]) {
    activeQuestions = shuffleArray([...pickFallback(selectedTopic, selectedGrade)]);
    questionsSource = "fallback";
  } else {
    loadFailed = true;
  }
}

function buildCurrentLevel(){
  // Fresh entry and mid-level deaths both land here: score rolls back to the
  // checkpoint taken when this level was entered.
  score = levelStartScore; scoreEl.textContent = score;
  levelNumEl.textContent = currentLevel;
  levelFinished = false;
  platforms=[]; spikes=[]; questions=[];
  walls=[]; gates=[]; mazeExit=null;
  pipes=[]; flappyGates=[]; flappyFinish=null; flappyHold=null; flappyCooldown=0;
  finishLine=null; cameraX=0; cameraY=0;

  if (activeQuestions && activeQuestions.length >= 5) {
    const s = (currentLevel - 1) * 5;
    const slice = activeQuestions.splice(s, 5);
    shuffleArray(slice);
    activeQuestions.splice(s, 0, ...slice);
  }

  if (currentLevel === 1) buildPlatformerLevel();
  else if (currentLevel === 2) buildMazeLevel();
  else buildFlappyLevel();

  clearKeys();
}

function buildPlatformerLevel(){
  document.body.dataset.mode = "platformer";
  document.body.style.backgroundImage =
    `url('${PLATFORMER_BACKGROUNDS[platformerBgIndex % PLATFORMER_BACKGROUNDS.length]}')`;
  platformerBgIndex++;

  const groundY = canvas.height - 96;
  const levelWidth = 2000;

  platforms.push({x:0,y:groundY,w:levelWidth,h:96,type:"ground"});

  const layout = PLATFORMER_LAYOUTS[platformerLayoutIndex % PLATFORMER_LAYOUTS.length];
  platformerLayoutIndex++;

  for(let i=0;i<10;i++){
    const px=300+i*200;
    const py=groundY-layout[i % layout.length];
    platforms.push({x:px,y:py,w:200,h:32,type:"platform"});
    spikes.push({x:px+80,y:py-32,w:40,h:24});
  }

  // Staggered heights (not a flat row) so the lucky blocks zigzag instead
  // of sitting parallel to each other; still within jump reach given the
  // platform layout the player climbs past.
  const QUESTION_HEIGHT_OFFSETS = [200, 260, 170, 300, 230];
  questionsForLevel(1).forEach((q,i)=>{
    questions.push({
      x:400+i*300,
      y:groundY-QUESTION_HEIGHT_OFFSETS[i % QUESTION_HEIGHT_OFFSETS.length],
      w:60,h:60,
      used:false,
      data:q
    });
  });

  // Green pipe marks the level exit/teleporter to Level 2.
  finishLine={x:levelWidth-70,y:groundY-140,w:70,h:140};

  Object.assign(player,{x:player.spawnX,y:player.spawnY,vx:0,vy:0});
}

// Top-view maze maps: `#` wall, `.` floor, `S` start, `E` exit, `G` question
// gate (solid until its question is answered correctly). Walls/gates are
// plain AABB rects so custom tile art later is a render-only swap. Three
// distinct layouts (each with exactly 4 gates) cycle on every replay.
const MAZE_LAYOUTS = [
  // "Branching" — the original hand-authored layout.
  [
    "#############",
    "#S..#....G..#",
    "###G#.#####G#",
    "#...#.#...#.#",
    "#.###.#.#.#.#",
    "#.#...#.#.G.#",
    "#.#.###.###.#",
    "#...#....E###",
    "#############"
  ],
  // "Snake" — a single back-and-forth corridor, gate at every turn.
  [
    "#############",
    "#S....G.....#",
    "###########.#",
    "#.....G.....#",
    "#.###########",
    "#.....G.....#",
    "###########.#",
    "#.....G....E#",
    "#############"
  ],
  // "Rooms" — six connected rooms in a 3x2 grid, gated doorways between them.
  [
    "#############",
    "#...#...#...#",
    "#S..G...G...#",
    "#...#...#...#",
    "###########.#",
    "#...#...#...#",
    "#.E.G...G...#",
    "#...#...#...#",
    "#############"
  ]
];
let mazeLayoutIndex = 0;
const MAZE_TILE = 80;

// Level 3 backdrop photos, cycling the same way PLATFORMER_BACKGROUNDS does.
const FLAPPY_BACKGROUNDS = [
  "FLAPPYBIRDBG.png",
  "GAMIFIEDJACQUESPIXELATED.png"
];
let flappyBgIndex = 0;

// Level 2 backdrop photos, cycling the same way PLATFORMER_BACKGROUNDS does.
const MAZE_BACKGROUNDS = [
  "GAMIFIEDCONVENTPIXELATED (1).png",
  "GAMIFIEDGATE3(2)PIXELATED (1).png"
];
let mazeBgIndex = 0;
const mazeBgImg = new Image();

function buildMazeLevel(){
  document.body.dataset.mode = "maze";
  // Seen from above: plain dark floor instead of the side-view topic sky.
  document.body.style.backgroundImage = "none";
  document.body.style.backgroundColor = "#141426";

  mazeBgImg.src = MAZE_BACKGROUNDS[mazeBgIndex % MAZE_BACKGROUNDS.length];
  mazeBgIndex++;

  const activeMazeMap = MAZE_LAYOUTS[mazeLayoutIndex % MAZE_LAYOUTS.length];
  mazeLayoutIndex++;

  mazeW = activeMazeMap[0].length * MAZE_TILE;
  mazeH = activeMazeMap.length * MAZE_TILE;

  const mazeQs = questionsForLevel(2);
  let gateCount = 0;
  activeMazeMap.forEach((row, r) => {
    [...row].forEach((cell, c) => {
      const x = c*MAZE_TILE, y = r*MAZE_TILE;
      if (cell === "#") walls.push({x, y, w:MAZE_TILE, h:MAZE_TILE});
      else if (cell === "G") gates.push({
        x, y, w:MAZE_TILE, h:MAZE_TILE, open:false, cooldown:0,
        data: mazeQs[gateCount++ % mazeQs.length]
      });
      else if (cell === "E") mazeExit = {x:x+10, y:y+10, w:MAZE_TILE-20, h:MAZE_TILE-20};
      else if (cell === "S") Object.assign(player, {
        x: x + (MAZE_TILE - player.w)/2,
        y: y + (MAZE_TILE - player.h)/2,
        vx:0, vy:0
      });
    });
  });

  player.onGround = true; // keeps the sprite on walk/idle frames
}

function buildFlappyLevel(){
  document.body.dataset.mode = "flappy";
  document.body.style.backgroundImage =
    `url('${FLAPPY_BACKGROUNDS[flappyBgIndex % FLAPPY_BACKGROUNDS.length]}')`;
  flappyBgIndex++;

  const groundY = canvas.height - 60;
  // Easier tuning: wider gaps and more space between pipes.
  const gapH = 280, pipeW = 70, spacing = 480;
  const flappyQs = questionsForLevel(3);
  let qi = 0;
  for(let i=0;i<10;i++){
    const gapY = 90 + Math.random() * Math.max(80, groundY - gapH - 180);
    const pipeX = canvas.width + 200 + i*spacing;
    pipes.push({ x: pipeX, w: pipeW, gapY, gapH });

    // Every 3rd pipe gets a question — but the lucky block now stands as its
    // own full-height gate well before the pipe, not blocking part of the
    // pipe's own gap. The pipe itself is always a normal, passable obstacle.
    const isQ = (i+1) % 3 === 0 && flappyQs.length > 0;
    if(isQ){
      flappyGates.push({
        x: pipeX - 220, w: 60,
        open: false,
        question: flappyQs[qi++ % flappyQs.length]
      });
    }
  }
  flappyFinish = { x: canvas.width + 200 + 10*spacing + 150, w: 20 };

  player.onGround = false; // keeps the sprite on the jump frame
  flapLatch = true;        // require a fresh press for the first flap
  Object.assign(player, {x: 160, y: canvas.height/2 - player.h/2, vx:0, vy:0});
}

  currentLevel = (requestedLevel >= 1 && requestedLevel <= 3) ? requestedLevel : 1;

  buildCurrentLevel();
  loop();
}

function finishLevel(){
  levelFinished = true;

  player.vy = 0;

  if (currentLevel < 3) {
    // Interstitial, then the next level — the topic isn't complete yet.
    const next = currentLevel + 1;
    document.getElementById("levelIntroTitle").textContent = `Level ${next}: ${levelName(next)}`;
    document.getElementById("levelIntroText").textContent =
      next === 2
        ? t("levelintro_maze_text", { n: POINTS_PER_LEVEL[2] })
        : t("levelintro_flappy_text", { n: POINTS_PER_LEVEL[3] });
    document.getElementById("levelIntro").style.display = "flex";
    return;
  }

  // Level 3 done -> the whole topic is complete.
  const completed = JSON.parse(localStorage.getItem("completedTopics") || "[]");
  if (!completed.includes(selectedTopic)) {
    completed.push(selectedTopic);
    localStorage.setItem("completedTopics", JSON.stringify(completed));
    saveProgressToServer(completed);
  }

  localStorage.setItem("lastScore", score);
  submitScoreToLeaderboard();

  summary.style.display = "flex";
  resultText.textContent = `${t("endscreen_score_label")} ${score}`;
}

function startNextLevel(){
  document.getElementById("levelIntro").style.display = "none";
  currentLevel++;
  levelStartScore = score;
  buildCurrentLevel();
}

// ================= UPDATE =================
function update(){
  if(isAsking || levelFinished) return;
  if(currentLevel === 1) updatePlatformer();
  else if(currentLevel === 2) updateMaze();
  else updateFlappy();
}

function updatePlatformer(){
  player.vx = 0;
  if(keys.ArrowLeft || keys.KeyA) player.vx = -player.speed;
  if(keys.ArrowRight || keys.KeyD) player.vx = player.speed;
  if((keys.Space || keys.ArrowUp) && player.onGround){
    player.vy = -14;
    player.onGround = false;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;
  platforms.forEach(p=>{
    if(
      player.x + player.w > p.x &&
      player.x < p.x + p.w &&
      player.y + player.h > p.y &&
      player.y + player.h < p.y + p.h + 20 &&
      player.vy >= 0
    ){
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // SPIKES = RESTART CURRENT LEVEL
  spikes.forEach(s=>{
    if(
      player.x < s.x + s.w &&
      player.x + player.w > s.x &&
      player.y < s.y + s.h &&
      player.y + player.h > s.y
    ){
      buildCurrentLevel();
    }
  });

  // QUESTIONS — a correct answer retires the block; a wrong one swaps in a
  // different question and leaves the block active so it can be retried.
questions.forEach(q=>{
  if(
    !q.used &&
    player.x < q.x + q.w &&
    player.x + player.w > q.x &&
    player.y < q.y + q.h &&
    player.y + player.h > q.y
  ){
    askQuestion(q, correct => {
      if (correct) q.used = true;
      else q.data = pickReplacementQuestion(q.data);
    });
  }
});

 // FINISH LINE
if (player.x + player.w > finishLine.x) {
  finishLevel();
  return;
}

  // CAMERA
  cameraX = Math.max(0, player.x - canvas.width / 2);
}

function updateMaze(){
  // Top-view movement: no gravity, 4-directional at walking speed.
  let dx = 0, dy = 0;
  if(keys.ArrowLeft || keys.KeyA) dx = -player.speed;
  if(keys.ArrowRight || keys.KeyD) dx = player.speed;
  if(keys.ArrowUp || keys.KeyW) dy = -player.speed;
  if(keys.ArrowDown || keys.KeyS) dy = player.speed;
  player.vx = dx; // drives the walk/idle sprite + facing flip

  // Axis-separated collision so the player slides along walls.
  const solids = walls.concat(gates.filter(g => !g.open));
  player.x += dx;
  solids.forEach(s=>{
    if(rectsOverlap(player, s)) player.x = dx > 0 ? s.x - player.w : s.x + s.w;
  });
  player.y += dy;
  solids.forEach(s=>{
    if(rectsOverlap(player, s)) player.y = dy > 0 ? s.y - player.h : s.y + s.h;
  });

  // Question gates: touching a closed gate asks its question; a correct
  // answer opens the way, a wrong one keeps it shut (walk up and retry).
  gates.forEach(g=>{
    if(g.open || isAsking) return;
    if(g.cooldown > 0){ g.cooldown--; return; }
    const near = {x:player.x-8, y:player.y-8, w:player.w+16, h:player.h+16};
    if(rectsOverlap(near, g)){
      askQuestion({data: g.data}, correct=>{
        if(correct) g.open = true;
        else { g.cooldown = 40; g.data = pickReplacementQuestion(g.data); }
      });
    }
  });

  if(mazeExit && rectsOverlap(player, mazeExit)){
    finishLevel();
    return;
  }

  // CAMERA — follows on both axes; centers the maze if it fits on screen.
  cameraX = mazeW <= canvas.width
    ? (mazeW - canvas.width) / 2
    : Math.max(0, Math.min(player.x + player.w/2 - canvas.width/2, mazeW - canvas.width));
  cameraY = mazeH <= canvas.height
    ? (mazeH - canvas.height) / 2
    : Math.max(0, Math.min(player.y + player.h/2 - canvas.height/2, mazeH - canvas.height));
}

function updateFlappy(){
  const groundY = canvas.height - 60;

  // A question gate freezes the world until it's answered correctly.
  if(flappyHold){
    if(flappyCooldown > 0){ flappyCooldown--; return; }
    const g = flappyHold;
    askQuestion({data: g.question}, correct=>{
      if(correct){ g.open = true; flappyHold = null; }
      else { flappyCooldown = 45; g.question = pickReplacementQuestion(g.question); } // brief pause, then a different question re-asks
    });
    return;
  }

  // Flap on a fresh press (Space/Up key or the touch jump button).
  const pressed = keys.Space || keys.ArrowUp;
  if(pressed && !flapLatch) player.vy = FLAPPY_IMPULSE;
  flapLatch = !!pressed;

  player.vy += FLAPPY_GRAVITY;
  player.y += player.vy;

  // Scroll the world left.
  pipes.forEach(p => p.x -= FLAPPY_SCROLL);
  flappyGates.forEach(g => g.x -= FLAPPY_SCROLL);
  flappyFinish.x -= FLAPPY_SCROLL;

  // The character sprite has a fair amount of transparent padding around the
  // actual silhouette, so testing collision against the full player.w x
  // player.h box felt unfairly large — it "died"/triggered before the visible
  // sprite touched anything. Inset the collision box to match what's on screen.
  const hbX = player.x + player.w * 0.18;
  const hbW = player.w * 0.64;
  const hbY = player.y + player.h * 0.15;
  const hbH = player.h * 0.8;

  // An unopened question gate freezes the world once the player reaches it —
  // it stands well before its pipe, not blocking part of the pipe's own gap.
  const nextGate = flappyGates.find(g =>
    !g.open && hbX + hbW > g.x && hbX < g.x + g.w
  );
  if(nextGate){ flappyHold = nextGate; flappyCooldown = 0; return; }

  // Ceiling and floor are soft: the player rests against them instead of dying,
  // so touching the ground is safe now — only hitting a pipe ends the run.
  if(player.y < 0){ player.y = 0; player.vy = 0; }
  if(player.y + player.h > groundY){ player.y = groundY - player.h; player.vy = 0; }

  for(const p of pipes){
    const inX = hbX + hbW > p.x && hbX < p.x + p.w;
    if(inX && (hbY < p.gapY || hbY + hbH > p.gapY + p.gapH)){
      buildCurrentLevel();
      return;
    }
  }

  if(flappyFinish.x < player.x) finishLevel();
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(-cameraX,-cameraY);

  if(currentLevel === 1) drawPlatformer();
  else if(currentLevel === 2) drawMaze();
  else drawFlappy();

  ctx.restore();
}

const BASE_TILE_W = 263; // Base.PNG's 1130x413 aspect ratio scaled to the 96px ground height
const STONE_OVERHANG = 16;

function drawPlatformer(){
  const baseReady = baseImg.complete && baseImg.naturalWidth > 0;
  const stoneReady = stonePlatformImg.complete && stonePlatformImg.naturalWidth > 0;

  platforms.forEach(p=>{
    if(p.type === "ground" && baseReady){
      for(let x=p.x; x<p.x+p.w; x+=BASE_TILE_W)
        ctx.drawImage(baseImg, x, p.y, BASE_TILE_W, p.h);
    } else if(p.type === "platform" && stoneReady){
      ctx.drawImage(stonePlatformImg, p.x, p.y - STONE_OVERHANG, p.w, p.h + STONE_OVERHANG*2);
    } else {
      for(let x=p.x;x<p.x+p.w;x+=32)
        for(let y=p.y;y<p.y+p.h;y+=32)
          ctx.drawImage(platformImg,x,y,32,32);
    }
  });

  ctx.fillStyle="red";
  spikes.forEach(s=>{
    ctx.beginPath();
    ctx.moveTo(s.x,s.y+s.h);
    ctx.lineTo(s.x+s.w/2,s.y);
    ctx.lineTo(s.x+s.w,s.y+s.h);
    ctx.fill();
  });

  questions.forEach(q=>{
    if(!q.used){
      if(!drawLuckyBlock(q.x,q.y,q.w,q.h)){
        ctx.fillStyle="yellow";
        ctx.fillRect(q.x,q.y,q.w,q.h);
        ctx.strokeRect(q.x,q.y,q.w,q.h);
        ctx.fillStyle="#000";
        ctx.font="bold 32px Arial";
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText("?",q.x+30,q.y+32);
      }
    }
  });

  if(pipeImg.complete && pipeImg.naturalWidth > 0){
    ctx.drawImage(pipeImg,finishLine.x,finishLine.y,finishLine.w,finishLine.h);
  } else {
    ctx.fillStyle="#fff";
    ctx.fillRect(finishLine.x,finishLine.y,finishLine.w,finishLine.h);
  }
  ctx.drawImage(currentPlayerSprite(),player.x,player.y,player.w,player.h);
}

// Shared sprite draw with a horizontal flip when moving left (used by the
// top-view maze so the character faces its walking direction).
function drawPlayerSpriteFlipped(){
  const img = currentPlayerSprite();
  if(player.vx < 0){
    ctx.save();
    ctx.translate(player.x + player.w, player.y);
    ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0, player.w, player.h);
    ctx.restore();
  } else {
    ctx.drawImage(img, player.x, player.y, player.w, player.h);
  }
}

function drawMaze(){
  // Floor seen from above — the topic backdrop photo, dimmed so the
  // walls/gates/player stay readable over it.
  if(mazeBgImg.complete && mazeBgImg.naturalWidth > 0){
    ctx.drawImage(mazeBgImg, 0, 0, mazeW, mazeH);
    ctx.fillStyle = "rgba(15,15,35,0.6)";
    ctx.fillRect(0, 0, mazeW, mazeH);
  } else {
    ctx.fillStyle = "#232345";
    ctx.fillRect(0, 0, mazeW, mazeH);
  }

  // Walls — flat placeholder blocks; swapping in tile art later only
  // touches these draw calls, never the collision rects.
  ctx.fillStyle = "#4b0010";
  walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
  ctx.strokeStyle = "rgba(255,215,0,.25)";
  walls.forEach(w => ctx.strokeRect(w.x, w.y, w.w, w.h));

  // Closed question gates.
  gates.forEach(g=>{
    if(g.open) return;
    if(!drawLuckyBlock(g.x, g.y, g.w, g.h)){
      ctx.fillStyle = "#FFD700";
      ctx.fillRect(g.x, g.y, g.w, g.h);
      ctx.strokeStyle = "#4b0010";
      ctx.strokeRect(g.x, g.y, g.w, g.h);
      ctx.fillStyle = "#000";
      ctx.font = "bold 40px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("?", g.x + g.w/2, g.y + g.h/2);
    }
  });

  // Exit — a green pipe teleporter, same collision box as before but drawn
  // longer than the tile so it visibly juts out — laid on its side (rather
  // than standing upright like Level 1's finish pipe) to fit the top-down view.
  if(mazeExit){
    if(pipeImg.complete && pipeImg.naturalWidth > 0){
      const pipeLen = 145, pipeThick = 70;
      const tileCenterX = mazeExit.x - 10 + MAZE_TILE/2;
      const tileCenterY = mazeExit.y - 10 + MAZE_TILE/2;
      ctx.save();
      ctx.translate(tileCenterX, tileCenterY);
      ctx.rotate(-Math.PI / 2);
      ctx.drawImage(pipeImg, -pipeThick/2, -pipeLen/2, pipeThick, pipeLen);
      ctx.restore();
    } else {
      ctx.fillStyle = "#4caf50";
      ctx.fillRect(mazeExit.x, mazeExit.y, mazeExit.w, mazeExit.h);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 16px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("EXIT", mazeExit.x + mazeExit.w/2, mazeExit.y + mazeExit.h/2);
    }
  }

  drawPlayerSpriteFlipped();
}

function drawFlappy(){
  const groundY = canvas.height - 60;

  // Pipes — the same green pipe sprite used elsewhere, stretched to fit each
  // segment. The top pipe is flipped vertically so its rim faces down into
  // the gap; the bottom pipe keeps its natural rim-up orientation.
  pipes.forEach(p=>{
    const botH = groundY - (p.gapY + p.gapH);
    if(pipeImg.complete && pipeImg.naturalWidth > 0){
      ctx.save();
      ctx.translate(p.x, p.gapY);
      ctx.scale(1, -1);
      ctx.drawImage(pipeImg, 0, 0, p.w, p.gapY);
      ctx.restore();
      ctx.drawImage(pipeImg, p.x, p.gapY + p.gapH, p.w, botH);
    } else {
      ctx.fillStyle = "#2e7d32";
      ctx.fillRect(p.x, 0, p.w, p.gapY);
      ctx.fillRect(p.x, p.gapY + p.gapH, p.w, botH);
      ctx.strokeStyle = "#1b4d1e";
      ctx.strokeRect(p.x, 0, p.w, p.gapY);
      ctx.strokeRect(p.x, p.gapY + p.gapH, p.w, botH);
    }
  });

  // Question gates — a full-height wall standing before its pipe, blocking
  // the path entirely until answered (rather than sitting inside the pipe's
  // own gap). Once answered it opens and stops drawing/colliding entirely.
  flappyGates.forEach(g=>{
    if(g.open) return;
    ctx.fillStyle = "rgba(75,0,16,.85)";
    ctx.fillRect(g.x, 0, g.w, groundY);
    ctx.strokeStyle = "#FFD700";
    ctx.strokeRect(g.x, 0, g.w, groundY);
    const bSize = g.w;
    const bY = groundY/2 - bSize/2;
    if(!drawLuckyBlock(g.x, bY, bSize, bSize)){
      ctx.fillStyle = "rgba(255,215,0,.75)";
      ctx.fillRect(g.x, bY, bSize, bSize);
      ctx.fillStyle = "#000";
      ctx.font = "bold 40px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("?", g.x + bSize/2, bY + bSize/2);
    }
  });

  // Finish flag.
  if(flappyFinish){
    ctx.fillStyle = "#fff";
    ctx.fillRect(flappyFinish.x, 0, flappyFinish.w, groundY);
  }

  // Ground strip.
  ctx.fillStyle = "#4b0010";
  ctx.fillRect(0, groundY, canvas.width, 60);

  ctx.drawImage(currentPlayerSprite(), player.x, player.y, player.w, player.h);
}

// ================= ANSWER UI =================
// A brief 3-2-1 beat shown after Continue, before gameplay resumes, so the
// player isn't dropped straight back into physics (mid-jump/mid-flap) the
// instant they finish reading the explanation.
const countdownOverlay = document.getElementById("countdownOverlay");
const countdownNumber = document.getElementById("countdownNumber");
function showCountdown(done){
  let n = 3;
  countdownNumber.textContent = n;
  countdownOverlay.style.display = "flex";
  const tick = () => {
    n--;
    if (n > 0) {
      countdownNumber.textContent = n;
      setTimeout(tick, 700);
    } else {
      countdownOverlay.style.display = "none";
      clearKeys(); // don't let input held during the countdown carry over
      done();
    }
  };
  setTimeout(tick, 700);
}

// onResult (optional) is called with true/false after the modal closes —
// maze gates and flappy question pipes use it to open (or stay shut).
function askQuestion(q, onResult){
  isAsking = true;
  clearKeys();

  const quizText = document.getElementById("quizText");
  const quizChoices = document.getElementById("quizChoices");
  const quizFeedback = document.getElementById("quizFeedback");
  const quizSourceBadge = document.getElementById("quizSourceBadge");
  const quizExplain = document.getElementById("quizExplain");
  const quizExplainText = document.getElementById("quizExplainText");
  const quizContinueBtn = document.getElementById("quizContinueBtn");

  // questionsSource is always "fallback" now (live Gemini calls are disabled,
  // see loadQuestions()), but the offline bank's 240 questions were written
  // with Gemini's help, so the badge still credits it rather than reading
  // "AI-generated" (which would imply a live per-question API call).
  quizSourceBadge.textContent = t("quiz_badge");
  quizSourceBadge.className = "source-gemini";

  quizText.textContent = q.data.text;
  quizFeedback.textContent = "";
  quizChoices.innerHTML = "";
  quizExplain.style.display = "none";
  quizContinueBtn.style.display = "none";

  q.data.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => {
      [...quizChoices.children].forEach(b => b.disabled = true);
      const isCorrect = (i + 1) === q.data.correct;

      if (isCorrect) {
        btn.style.background = "#4caf50";
        score += POINTS_PER_LEVEL[currentLevel];
        scoreEl.textContent = score;
        quizFeedback.textContent = t("quiz_correct_feedback", { n: POINTS_PER_LEVEL[currentLevel] });
      } else {
        btn.style.background = "#e53935";
        quizChoices.children[q.data.correct - 1].style.background = "#4caf50";
        quizFeedback.textContent = t("quiz_wrong_feedback");
      }

      // Domie explains the answer (right or wrong); the player reads it on
      // their own time and taps Continue instead of the modal auto-closing.
      quizExplainText.textContent = q.data.explain || "";
      quizExplain.style.display = "flex";
      quizContinueBtn.style.display = "block";
      quizContinueBtn.onclick = () => {
        quizModal.style.display = "none";
        // isAsking stays true through the countdown so physics/scrolling
        // stay frozen — gives the player a beat to get their bearings
        // before the level resumes.
        showCountdown(() => {
          isAsking = false;
          if (onResult) onResult(isCorrect);
        });
      };
    };
    quizChoices.appendChild(btn);
  });

  quizModal.style.display = "flex";
}

  window.location.href = "level map.html";
}

  window.location.href = "index.html";
}

  window.location.href = "level map.html";
}
