<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Study Game - Play</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

body {
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#hud {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 8px 12px;
  background: rgba(0,0,0,.6);
  color: #fff;
  border-radius: 8px;
  font-weight: bold;
}

.overlay-base {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.7);
}

.card {
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  text-align: center;
  max-width: 480px;
}

.card button {
  margin: 10px;
  padding: 10px 16px;
  font-weight: bold;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
}

#quizChoices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

#quizChoices button {
  margin: 0;
  padding: 10px 16px;
  font-weight: bold;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
}

#quizChoices button:disabled {
  cursor: default;
}

#quizFeedback {
  min-height: 20px;
  font-weight: bold;
}

#quizSourceBadge {
  display: inline-block;
  margin-bottom: 10px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-family: 'Press Start 2P', cursive;
  text-shadow: 1px 1px #000;
}

#quizSourceBadge.source-gemini {
  background: #4b0010;
  color: #FFD700;
}

#quizSourceBadge.source-fallback {
  background: #555;
  color: #ddd;
}

/* TOUCH CONTROLS — shown only on touch devices (no mouse hover, coarse pointer) */
#touchControls { display: none; }
@media (hover: none) and (pointer: coarse) {
  #touchControls { display: block; }
}

.touch-btn {
  position: fixed;
  bottom: 28px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(0,0,0,.55);
  border: 3px solid #FFD700;
  color: #FFD700;
  font-size: 26px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  z-index: 20;
}

#touchLeft { left: 24px; }
#touchRight { left: 100px; }
#touchJump { right: 24px; }

.touch-btn.pressed {
  background: rgba(255,215,0,.35);
}
</style>
</head>

<canvas id="gameCanvas"></canvas>

<div id="hud">

  Topic: <span id="lvl">Biology</span> (Grade <span id="gradeDisplay">7</span>)
</div>

<div id="summary" class="overlay-base">
  <div class="card">
    <h2>Level Complete!</h2>
    <p id="resultText"></p>
    <button onclick="goMenu()">Main Menu</button>
<button onclick="goMap()">Level Map</button>
<button onclick="goRanks()">View Ranks</button>
	<button onclick="chooseAnotherTopic()">Choose Another Topic</button>
  </div>
</div>

<div id="loadingOverlay" class="overlay-base" style="display:flex">
  <div class="card">
    <h2>Loading questions...</h2>
  </div>
</div>

<div id="errorOverlay" class="overlay-base">
  <div class="card">
    <h2>Couldn't load questions</h2>
    <p>No offline questions exist for this topic yet. Check the Gemini API key/network and try again.</p>
    <button onclick="location.reload()">Retry</button>
    <button onclick="window.location.href='level map.html'">Back to Topic Select</button>
  </div>
</div>

<div id="touchControls">
  <div class="touch-btn" id="touchLeft">◀</div>
  <div class="touch-btn" id="touchRight">▶</div>
  <div class="touch-btn" id="touchJump">⬆</div>
</div>

<div id="quizModal" class="overlay-base">

    <p id="quizSourceBadge"></p>
    <p id="quizText"></p>
    <div id="quizChoices"></div>
    <p id="quizFeedback"></p>

</div>

// ================= GRADE / TOPIC =================
const selectedGrade = parseInt(localStorage.getItem("selectedGrade")) || 7;
const selectedTopic = localStorage.getItem("selectedTopic") || "Biology";
const selectedSubject = localStorage.getItem("selectedSubject") || "Science";
document.getElementById("lvl").textContent = selectedTopic;
document.getElementById("gradeDisplay").textContent = selectedGrade;

// ================= APPS SCRIPT BACKEND =================
const API_URL = "https://script.google.com/macros/s/AKfycbykSaLnj6ilD-77IYXzTqpu0jsKh7T7kHA07Lt6iOkXWHhYFL5Wu4yYJ4KaHnIoktE-7Q/exec";

function saveProgressToServer(completedTopics) {
  const username = localStorage.getItem("loggedInUser");
  const isGuest = localStorage.getItem("isGuest") === "true";
  if (!username || isGuest) return;
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "saveProgress", username, completedTopics, selectedGrade })
  }).catch(() => {}); // fire-and-forget, offline progress still lives in localStorage
}

// ================= GEMINI QUESTION GENERATION =================
// NOTE: this key is intentionally hardcoded client-side (accepted risk for a
// static site, per project decision) — anyone viewing page source can read it.
const GEMINI_API_KEY = "AQ.Ab8RN6KGlQuMcRf4ZBf3y8-D2VMeA-0gxbJT_6W33e-bpBSmog";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

function validateQuestions(arr) {
  return Array.isArray(arr) && arr.length === 5 && arr.every(q =>
    q && typeof q.text === "string" &&
    Array.isArray(q.choices) && q.choices.length === 4 &&
    Number.isInteger(q.correct) && q.correct >= 1 && q.correct <= 4
  );
}

async function fetchGeminiQuestions(topic, grade) {
  const prompt = `Generate exactly 5 multiple-choice ${selectedSubject} questions on the topic "${topic}" for a grade ${grade} student.
Respond with ONLY strict JSON, no markdown fences, matching exactly this shape:
[{"text":"...", "choices":["...","...","...","..."], "correct":1}, ...]
"correct" is a 1-indexed integer (1-4) pointing to the correct entry in "choices". Exactly 5 items, exactly 4 choices each.`;

  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if (!res.ok) throw new Error("gemini_http_" + res.status);

  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  const cleaned = raw.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(cleaned);

  if (!validateQuestions(parsed)) throw new Error("gemini_shape_invalid");
  return parsed;
}

function pickFallback(topic, grade) {
  const tier = grade <= 8 ? "low" : grade === 9 ? "mid" : "high";
  return FALLBACK_BANKS[topic][tier];
}

let activeQuestions = null;
let loadFailed = false;
let questionsSource = null; // "gemini" or "fallback"

async function loadQuestions() {
  try {
    activeQuestions = await fetchGeminiQuestions(selectedTopic, selectedGrade);
    questionsSource = "gemini";
  } catch (e) {
    if (FALLBACK_BANKS[selectedTopic]) {
      activeQuestions = pickFallback(selectedTopic, selectedGrade);
      questionsSource = "fallback";
    } else {
      loadFailed = true;
    }
  }
}

// ================= SCORE =================
let score = 0;
const scoreEl = document.getElementById("score");

// ================= IMAGES =================
const chosenCharacter = localStorage.getItem("chosenCharacter") || "panpan";
const playerSprites = {
  idle: new Image(),
  walk: new Image(),
  jump: new Image()
};
playerSprites.idle.src = `${chosenCharacter}_idle.png`;
playerSprites.walk.src = `${chosenCharacter}_walk.png`;
playerSprites.jump.src = `${chosenCharacter}_jump.png`;

function currentPlayerSprite() {
  if (!player.onGround) return playerSprites.jump;
  if (player.vx !== 0) return playerSprites.walk;
  return playerSprites.idle;
}

const platformImg = new Image();
platformImg.src = "block.png";

// ================= PLAYER =================
const player = {
  x:120, y:100, w:48, h:72,
  vx:0, vy:0,
  speed:5,
  onGround:false,
  spawnX:120,
  spawnY:100
};

const gravity = 0.6;

// ================= INPUT =================
const keys = {};
addEventListener("keydown", e => keys[e.code] = true);
addEventListener("keyup", e => keys[e.code] = false);
function clearKeys(){ for (let k in keys) keys[k] = false; }

// ================= TOUCH CONTROLS =================
// Same `keys` map the keyboard uses — update() doesn't need to know the source.
function bindTouchButton(id, code) {
  const btn = document.getElementById(id);
  const press = e => { e.preventDefault(); keys[code] = true; btn.classList.add("pressed"); };
  const release = e => { e.preventDefault(); keys[code] = false; btn.classList.remove("pressed"); };
  btn.addEventListener("touchstart", press, { passive: false });
  btn.addEventListener("touchend", release, { passive: false });
  btn.addEventListener("touchcancel", release, { passive: false });
}
bindTouchButton("touchLeft", "ArrowLeft");
bindTouchButton("touchRight", "ArrowRight");
bindTouchButton("touchJump", "Space");

// ================= OBJECTS =================
let platforms=[], spikes=[], questions=[];
let finishLine=null;
let cameraX=0;
let levelFinished=false;
let isAsking=false;

// ================= BUILD LEVEL =================
function buildLevel(){
  platforms=[]; spikes=[]; questions=[];
  score=0; scoreEl.textContent=score;
  levelFinished=false;
  setLevelBackground();

  const groundY = canvas.height - 96;
  const levelWidth = 2000;

  platforms.push({x:0,y:groundY,w:levelWidth,h:96});

  for(let i=0;i<10;i++){
    const px=300+i*200;
    const py=groundY-160-(i%2)*80;
    platforms.push({x:px,y:py,w:200,h:32});
    spikes.push({x:px+80,y:py-32,w:40,h:24});
  }

  (activeQuestions || []).forEach((q,i)=>{
    questions.push({
      x:400+i*300,
      y:groundY-220,
      w:60,h:60,
      used:false,
      data:q
    });
  });

  finishLine={x:levelWidth-40,y:groundY-120,w:20,h:120};

  Object.assign(player,{x:player.spawnX,y:player.spawnY,vx:0,vy:0});
  clearKeys();
}

// ================= GAME LOOP =================
function loop(){ update(); draw(); requestAnimationFrame(loop); }

let imgReady = false;
let spritesLoaded = 0;
[playerSprites.idle, playerSprites.walk, playerSprites.jump].forEach(img => {
  img.onload = () => {
    spritesLoaded++;
    if (spritesLoaded === 3) { imgReady = true; tryStart(); }
  };
});

loadQuestions().then(tryStart);

function tryStart(){
  if(!imgReady) return;
  if(activeQuestions === null && !loadFailed) return; // still loading

  loadingOverlay.style.display = "none";

  if(loadFailed){
    errorOverlay.style.display = "flex";
    return;
  }
  buildLevel();
  loop();
}

// ================= UPDATE =================
function update(){
  if(isAsking || levelFinished) return;

  player.vx = 0;
  if(keys.ArrowLeft || keys.KeyA) player.vx = -player.speed;
  if(keys.ArrowRight || keys.KeyD) player.vx = player.speed;
  if((keys.Space || keys.ArrowUp) && player.onGround){
    player.vy = -14;
    player.onGround = false;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;
  platforms.forEach(p=>{
    if(
      player.x + player.w > p.x &&
      player.x < p.x + p.w &&
      player.y + player.h > p.y &&
      player.y + player.h < p.y + p.h + 20 &&
      player.vy >= 0
    ){
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // SPIKES = RESTART LEVEL
  spikes.forEach(s=>{
    if(
      player.x < s.x + s.w &&
      player.x + player.w > s.x &&
      player.y < s.y + s.h &&
      player.y + player.h > s.y
    ){
      buildLevel();
    }
  });

  // QUESTIONS
questions.forEach(q=>{
  if(
    !q.used &&
    player.x < q.x + q.w &&
    player.x + player.w > q.x &&
    player.y < q.y + q.h &&
    player.y + player.h > q.y
  ){
    q.used = true;        // ✅ IMPORTANT (mark immediately so it can't re-trigger)
    askQuestion(q);
  }
});

 // FINISH LINE
if (player.x + player.w > finishLine.x) {
  levelFinished = true;

  const completed = JSON.parse(localStorage.getItem("completedTopics") || "[]");
  if (!completed.includes(selectedTopic)) {
    completed.push(selectedTopic);
    localStorage.setItem("completedTopics", JSON.stringify(completed));
    saveProgressToServer(completed);
  }

  // ✅ SAVE SCORE FOR RANKS
  localStorage.setItem("lastScore", score);

  summary.style.display = "flex";
  resultText.textContent = `Score: ${score}/5`;

  player.vx = 0;
  player.vy = 0;
}

  // CAMERA
  cameraX = Math.max(0, player.x - canvas.width / 2);
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(-cameraX,0);

  platforms.forEach(p=>{
    for(let x=p.x;x<p.x+p.w;x+=32)
      for(let y=p.y;y<p.y+p.h;y+=32)
        ctx.drawImage(platformImg,x,y,32,32);
  });

  ctx.fillStyle="red";
  spikes.forEach(s=>{
    ctx.beginPath();
    ctx.moveTo(s.x,s.y+s.h);
    ctx.lineTo(s.x+s.w/2,s.y);
    ctx.lineTo(s.x+s.w,s.y+s.h);
    ctx.fill();
  });

  ctx.fillStyle="yellow";
  questions.forEach(q=>{
    if(!q.used){
      ctx.fillRect(q.x,q.y,q.w,q.h);
      ctx.strokeRect(q.x,q.y,q.w,q.h);
      ctx.fillStyle="#000";
      ctx.font="bold 32px Arial";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText("?",q.x+30,q.y+32);
      ctx.fillStyle="yellow";
    }
  });

  ctx.fillStyle="#fff";
  ctx.fillRect(finishLine.x,finishLine.y,finishLine.w,finishLine.h);
  ctx.drawImage(currentPlayerSprite(),player.x,player.y,player.w,player.h);

  ctx.restore();
}

// ================= ANSWER UI =================
function askQuestion(q){
  isAsking = true;
  clearKeys();

  const quizText = document.getElementById("quizText");
  const quizChoices = document.getElementById("quizChoices");
  const quizFeedback = document.getElementById("quizFeedback");
  const quizSourceBadge = document.getElementById("quizSourceBadge");

  quizSourceBadge.textContent = questionsSource === "gemini" ? "✨ AI-generated question" : "📘 Offline question bank";
  quizSourceBadge.className = questionsSource === "gemini" ? "source-gemini" : "source-fallback";

  quizText.textContent = q.data.text;
  quizFeedback.textContent = "";
  quizChoices.innerHTML = "";

  q.data.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => {
      [...quizChoices.children].forEach(b => b.disabled = true);
      const isCorrect = (i + 1) === q.data.correct;

      if (isCorrect) {
        btn.style.background = "#4caf50";
        score++;
        scoreEl.textContent = score;
        quizFeedback.textContent = "Correct!";
      } else {
        btn.style.background = "#e53935";
        quizChoices.children[q.data.correct - 1].style.background = "#4caf50";
        quizFeedback.textContent = "Wrong — correct answer highlighted.";
      }

      setTimeout(() => {
        quizModal.style.display = "none";
        isAsking = false;
      }, 1200);
    };
    quizChoices.appendChild(btn);
  });

  quizModal.style.display = "flex";
}
