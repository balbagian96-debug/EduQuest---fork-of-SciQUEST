<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Select</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Press Start 2P', cursive;
}

body {
  background: url("level bg.png") no-repeat center center fixed;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONTAINER */
#levels {
  background: rgba(0,0,0,0.6);
  padding: 35px 45px;
  border-radius: 18px;
  text-align: center;
  color: white;
}

#levels h1 {
  margin-bottom: 30px;
  color: #FFD700;
}

/* FLOAT ANIMATION */
@keyframes float {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* LEVEL BUTTON */
.level-btn {
  display: block;
  width: 260px;
  margin: 16px auto;
  padding: 16px;
  font-size: 14px;
  border-radius: 12px;
  border: 3px solid #FFD700;
  background: rgba(0,0,0,0.75);
  color: #FFD700;
  cursor: pointer;
  transition: 0.25s;
  animation: float 2.5s ease-in-out infinite;
}

.level-btn:hover {
  background: #FFD700;
  color: #000;
  transform: scale(1.08);
}

/* BACK BUTTON */
#backBtn {
  margin-top: 28px;
  background: #4b0010;
}

/* CHANGE GRADE BUTTON */
#changeGradeBtn {
  margin-top: 12px;
  background: #4b0010;
  font-size: 12px;
}

@media (max-width: 480px) {
  #levels { padding: 24px 20px; }
  #levels h1 { font-size: 13px; margin-bottom: 20px; }
  .level-btn { width: min(260px, 78vw); font-size: 12px; padding: 12px; }
  #topicList { gap: 20px; flex-wrap: wrap; }
}
</style>
</head>

<body>

<div id="levels">
  <h1 id="mapTitle">🗺️ Select Topic</h1>

  <div id="topicList"></div>

  <button class="level-btn" id="backBtn">⬅ Main Menu</button>
  <button class="level-btn" id="changeGradeBtn">🎓 Change Grade</button>
</div>

<script>
// Subjects group the topic map — add a subject or a topic here to extend
// the map. Each topic has an offline fallback question set in start.html's
// FALLBACK_BANKS, used if a live Gemini call fails.
const SUBJECTS = [
  {
    name: "Science",
    topics: [
      { key: "Biology" },
      { key: "Physics" },
      { key: "Geology" }
    ]
  },
  {
    name: "Math",
    topics: [
      { key: "Arithmetic" },
      { key: "Algebra" },
      { key: "Geometry" }
    ]
  },
  {
    name: "English/Reading",
    topics: [
      { key: "Literature" },
      { key: "Grammar" }
    ]
  }
];

const selectedGrade = localStorage.getItem("selectedGrade");
const completedTopics = JSON.parse(localStorage.getItem("completedTopics") || "[]");
const topicList = document.getElementById("topicList");
const mapTitle = document.getElementById("mapTitle");
const backBtn = document.getElementById("backBtn");

const gradePrefix = selectedGrade ? `Grade ${selectedGrade} — ` : "";

// Two-step select: subject first, then its subtopics.
function showSubjects() {
  mapTitle.textContent = `🗺️ ${gradePrefix}Select Subject`;
  topicList.innerHTML = "";

  SUBJECTS.forEach(subject => {
    const btn = document.createElement("button");
    btn.className = "level-btn";
    const done = subject.topics.every(t => completedTopics.includes(t.key));
    btn.textContent = done ? `${subject.name} ✅` : subject.name;
    btn.onclick = () => showTopics(subject);
    topicList.appendChild(btn);
  });

  backBtn.textContent = "⬅ Main Menu";
  backBtn.onclick = () => {
    window.location.href = "index.html";
  };
}

function showTopics(subject) {
  mapTitle.textContent = `🗺️ ${gradePrefix}${subject.name}`;
  topicList.innerHTML = "";

  subject.topics.forEach(topic => {
    const btn = document.createElement("button");
    btn.className = "level-btn";
    const done = completedTopics.includes(topic.key);
    btn.textContent = done ? `${topic.key} ✅` : topic.key;
    btn.onclick = () => {
      localStorage.setItem("selectedTopic", topic.key);
      localStorage.setItem("selectedSubject", subject.name);
      window.location.href = "start.html";
    };
    topicList.appendChild(btn);
  });

  backBtn.textContent = "⬅ Subjects";
  backBtn.onclick = showSubjects;
}

document.getElementById("changeGradeBtn").onclick = () => {
  window.location.href = "grade-select.html";
};

showSubjects();
</script>

</body>

</html>
